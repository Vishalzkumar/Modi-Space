<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modi Space Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d1226;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        overflow: hidden;
      }
      canvas {
        border: 2px solid #4090ff;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Set canvas size based on screen
      function resizeCanvas() {
        if (window.innerHeight > window.innerWidth) {
          // Mobile
          canvas.width = 720;
          canvas.height = 1280;
        } else {
          // Desktop
          canvas.width = 1550;
          canvas.height = 815;
        }
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // Game variables
      let gameState = "menu";
      let score = 0;
      let wave = 1;
      let health = 100;
      let spread = 1;
      let shield = false;
      let shieldTimer = 0;

      // Player
      const player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        width: 40,
        height: 40,
        speed: 300,
        vx: 0,
        vy: 0,
      };

      // Arrays
      let bullets = [];
      let enemies = [];
      let powerups = [];
      let particles = [];

      // Input
      const keys = {};
      window.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        if (e.key === " ") {
          e.preventDefault();
          if (gameState === "menu") startGame();
          if (gameState === "gameover") location.reload();
        }
      });
      window.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });

      // Mouse/Touch movement
      let mouseX = canvas.width / 2;
      let mouseY = canvas.height - 100;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX - canvas.getBoundingClientRect().left;
        mouseY = e.clientY - canvas.getBoundingClientRect().top;
      });

      document.addEventListener("touchmove", (e) => {
        const touch = e.touches[0];
        mouseX = touch.clientX - canvas.getBoundingClientRect().left;
        mouseY = touch.clientY - canvas.getBoundingClientRect().top;
        e.preventDefault();
      });

      function startGame() {
        gameState = "playing";
        score = 0;
        wave = 1;
        health = 100;
        spread = 1;
        shield = false;
        bullets = [];
        enemies = [];
        powerups = [];
        particles = [];
        player.x = canvas.width / 2;
        player.y = canvas.height - 100;
      }

      function spawnEnemy() {
        const x = Math.random() * (canvas.width - 100) + 50;
        enemies.push({
          x: x,
          y: -30,
          width: 40,
          height: 40,
          speed: 100 + wave * 20,
          health: 10 + wave * 3,
          maxHealth: 10 + wave * 3,
          points: 20 + wave * 10,
        });
      }

      function fire() {
        const bulletSpeed = 500;
        if (spread === 1) {
          bullets.push({
            x: player.x,
            y: player.y - 20,
            vx: 0,
            vy: -bulletSpeed,
          });
        } else if (spread === 2) {
          bullets.push({
            x: player.x - 10,
            y: player.y - 20,
            vx: -50,
            vy: -bulletSpeed,
          });
          bullets.push({
            x: player.x + 10,
            y: player.y - 20,
            vx: 50,
            vy: -bulletSpeed,
          });
        } else {
          bullets.push({
            x: player.x,
            y: player.y - 20,
            vx: 0,
            vy: -bulletSpeed,
          });
          bullets.push({
            x: player.x - 15,
            y: player.y - 20,
            vx: -80,
            vy: -bulletSpeed,
          });
          bullets.push({
            x: player.x + 15,
            y: player.y - 20,
            vx: 80,
            vy: -bulletSpeed,
          });
        }
      }

      function spawnPowerup(x, y) {
        const types = ["shield", "spread", "score"];
        const type = types[Math.floor(Math.random() * types.length)];
        powerups.push({
          x: x,
          y: y,
          vx: 0,
          vy: 80,
          type: type,
          size: 15,
        });
      }

      function createExplosion(x, y) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 200,
            vy: (Math.random() - 0.5) * 200,
            life: 0.3,
            maxLife: 0.3,
            size: Math.random() * 3 + 2,
          });
        }
      }

      let fireTimer = 0;
      let spawnTimer = 0;
      let lastTime = Date.now();

      function gameLoop() {
        const now = Date.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        // Clear
        ctx.fillStyle = "#0d1226";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === "menu") {
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 48px Arial";
          ctx.textAlign = "center";
          ctx.fillText("MODI SPACE", canvas.width / 2, 100);
          ctx.font = "24px Arial";
          ctx.fillText("Press SPACE to Start", canvas.width / 2, 150);
          ctx.fillText(
            "Arrow/WASD: Move | SPACE: Fire",
            canvas.width / 2,
            canvas.height - 50,
          );
        } else if (gameState === "playing") {
          // Update player
          const moveSpeed = 300;
          player.vx = 0;
          player.vy = 0;

          if (keys["ArrowLeft"] || keys["a"] || keys["A"])
            player.vx = -moveSpeed;
          if (keys["ArrowRight"] || keys["d"] || keys["D"])
            player.vx = moveSpeed;
          if (keys["ArrowUp"] || keys["w"] || keys["W"]) player.vy = -moveSpeed;
          if (keys["ArrowDown"] || keys["s"] || keys["S"])
            player.vy = moveSpeed;

          player.x += player.vx * dt;
          player.y += player.vy * dt;

          // Clamp player
          player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
          player.y = Math.max(20, Math.min(canvas.height - 20, player.y));

          // Fire
          fireTimer -= dt;
          if ((keys[" "] || true) && fireTimer <= 0) {
            fire();
            fireTimer = 0.15;
          }

          // Spawn enemies
          if (enemies.length < 5 + wave * 1.2) {
            spawnTimer -= dt;
            if (spawnTimer <= 0) {
              spawnEnemy();
              spawnTimer = Math.max(0.4, 1 - wave * 0.03);
            }
          }

          // Update bullets
          for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x += bullets[i].vx * dt;
            bullets[i].y += bullets[i].vy * dt;
            if (bullets[i].y < 0 || bullets[i].y > canvas.height) {
              bullets.splice(i, 1);
            }
          }

          // Update enemies
          for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].y += enemies[i].speed * dt;
            enemies[i].x += Math.sin(Date.now() / 500 + i) * 30 * dt;

            if (enemies[i].y > canvas.height) {
              enemies.splice(i, 1);
              health -= 5;
            }
          }

          // Collision detection
          for (let i = bullets.length - 1; i >= 0; i--) {
            for (let j = enemies.length - 1; j >= 0; j--) {
              const dx = bullets[i].x - enemies[j].x;
              const dy = bullets[i].y - enemies[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 35) {
                enemies[j].health -= 20;
                bullets.splice(i, 1);
                if (enemies[j].health <= 0) {
                  score += enemies[j].points;
                  createExplosion(enemies[j].x, enemies[j].y);
                  if (Math.random() < 0.2) {
                    spawnPowerup(enemies[j].x, enemies[j].y);
                  }
                  enemies.splice(j, 1);
                }
                break;
              }
            }
          }

          // Enemy collision with player
          for (let i = enemies.length - 1; i >= 0; i--) {
            const dx = enemies[i].x - player.x;
            const dy = enemies[i].y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 50) {
              health -= 10;
              createExplosion(enemies[i].x, enemies[i].y);
              enemies.splice(i, 1);
            }
          }

          // Powerup collision
          for (let i = powerups.length - 1; i >= 0; i--) {
            powerups[i].y += powerups[i].vy * dt;
            const dx = powerups[i].x - player.x;
            const dy = powerups[i].y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 40) {
              if (powerups[i].type === "shield") {
                shield = true;
                shieldTimer = 5;
              } else if (powerups[i].type === "spread") {
                spread = Math.min(3, spread + 1);
              } else if (powerups[i].type === "score") {
                score += 100;
              }
              powerups.splice(i, 1);
            }
          }

          // Update shield
          if (shield) {
            shieldTimer -= dt;
            if (shieldTimer <= 0) shield = false;
          }

          // Update particles
          for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].x += particles[i].vx * dt;
            particles[i].y += particles[i].vy * dt;
            particles[i].life -= dt;
            if (particles[i].life <= 0) {
              particles.splice(i, 1);
            }
          }

          // Draw game
          // Draw enemies
          ctx.fillStyle = "#ff6600";
          enemies.forEach((e) => {
            ctx.fillRect(e.x - 20, e.y - 20, 40, 40);
            // Health bar
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(e.x - 20, e.y - 30, 40 * (e.health / e.maxHealth), 5);
            ctx.fillStyle = "#ff6600";
          });

          // Draw bullets
          ctx.fillStyle = "#a0ffff";
          bullets.forEach((b) => {
            ctx.fillRect(b.x - 3, b.y - 10, 6, 20);
          });

          // Draw powerups
          powerups.forEach((p) => {
            const colors = {
              shield: "#46beff",
              spread: "#ff69b4",
              score: "#ffdc50",
            };
            ctx.fillStyle = colors[p.type];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          });

          // Draw particles
          particles.forEach((p) => {
            const colors = ["#ffb43c", "#ff5a28", "#ffff6e", "#c0ffff"];
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          });

          // Draw player
          ctx.fillStyle = "#a0d0ff";
          ctx.fillRect(player.x - 20, player.y - 20, 40, 40);

          // Draw shield
          if (shield) {
            ctx.strokeStyle = "#73d2ff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x, player.y, 60, 0, Math.PI * 2);
            ctx.stroke();
          }

          // Draw HUD
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 24px Arial";
          ctx.textAlign = "left";
          ctx.fillText("SCORE: " + score, 20, 40);
          ctx.fillText("WAVE " + wave, 20, 80);
          ctx.fillText("HEALTH: " + health, 20, 120);

          // Game over check
          if (health <= 0) {
            gameState = "gameover";
          }
        } else if (gameState === "gameover") {
          ctx.fillStyle = "rgba(0,0,0,0.7)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 48px Arial";
          ctx.textAlign = "center";
          ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 50);
          ctx.font = "32px Arial";
          ctx.fillText(
            "FINAL SCORE: " + score,
            canvas.width / 2,
            canvas.height / 2 + 30,
          );
          ctx.font = "24px Arial";
          ctx.fillText(
            "Press SPACE to Restart",
            canvas.width / 2,
            canvas.height / 2 + 100,
          );
        }

        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
</html>
